# AI 应用监测后端进程编排
#
# 默认只编排后端 API、Dramatiq worker 和 APScheduler scheduler。
# PostgreSQL、Redis、Nacos 均使用根目录 .env 指向的服务器服务，不在本地
# compose 中默认启动。

name: geo-platform-backend

x-backend-common: &backend-common
  env_file:
    - .env
  environment:
    - APP_ENV=${APP_ENV:-prod}
    - APP_DEBUG=${APP_DEBUG:-false}
    - APP_TIMEZONE=${APP_TIMEZONE:-Asia/Shanghai}
    - TZ=${APP_TIMEZONE:-Asia/Shanghai}
    - DRAMATIQ_BROKER=${DRAMATIQ_BROKER:-redis}
    - REPORT_STORAGE_DIR=/app/backend/data/reports
  volumes:
    - reports_data:/app/backend/data/reports
  restart: unless-stopped

x-release-commands:
  migrate: docker compose run --rm api python -m alembic -c backend/alembic.ini upgrade head
  smoke: health, ready, create test project, mock run, report download

services:
  api:
    <<: *backend-common
    image: geo-platform-backend:${APP_IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/geo-monitoring/health', timeout=3)\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker:
    <<: *backend-common
    image: geo-platform-backend:${APP_IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      dramatiq app.worker.actors.collection app.worker.actors.analysis app.worker.actors.report
      -Q collection -Q analysis -Q report
      --processes ${WORKER_PROCESSES:-2}
      --threads ${WORKER_THREADS:-1}

  scheduler:
    <<: *backend-common
    image: geo-platform-backend:${APP_IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - APP_ENV=${APP_ENV:-prod}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_TIMEZONE=${APP_TIMEZONE:-Asia/Shanghai}
      - TZ=${APP_TIMEZONE:-Asia/Shanghai}
      - DRAMATIQ_BROKER=${DRAMATIQ_BROKER:-redis}
      - REPORT_STORAGE_DIR=/app/backend/data/reports
      - SCHEDULER_ENABLED=true
    command: >
      python -m app.scheduler.main

volumes:
  reports_data:
    name: geo_platform_reports_data
