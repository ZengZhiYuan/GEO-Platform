# AI 应用监测中间件编排
#
# 启动后端运行所需的两个中间件：
#   - postgres : PostgreSQL 16，应用主数据库（连接见 DATABASE_URL）
#   - redis    : Redis 7，Dramatiq broker（连接见 REDIS_URL）
#
# 配置默认值与根目录 .env.example 对齐；若存在 .env 文件会自动读取并覆盖。
# 数据写入命名卷持久化，容器随 Docker 自启。
#
# 用法：
#   docker compose up -d        # 启动（后台）
#   docker compose ps           # 查看状态 / 健康检查
#   docker compose logs -f      # 跟踪日志
#   docker compose down         # 停止并删除容器（保留数据卷）
#   docker compose down -v      # 连同数据卷一起删除（慎用，会清空数据）

services:
  postgres:
    image: postgres:16
    container_name: shipu_geo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shipu_geo}
      POSTGRES_USER: ${POSTGRES_USER:-shipu_geo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shipu_geo_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # pg_isready 校验库已可接受连接；用户/库名取上面的环境变量
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shipu_geo} -d ${POSTGRES_DB:-shipu_geo}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7
    container_name: shipu_geo_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  pgdata:
    name: shipu_geo_pgdata
  redisdata:
    name: shipu_geo_redisdata
