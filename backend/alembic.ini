# Alembic config (Shipu GEO backend).
#
# NOTE: keep this file ASCII-only. Alembic reads alembic.ini with the OS
# locale encoding (e.g. GBK on zh-CN Windows), so non-ASCII comments break it.
#
# The database URL is NOT hardcoded here; alembic/env.py loads it from
# app.core.config.settings.DATABASE_URL to stay in sync with the app.

[alembic]
# Migration scripts directory (relative to backend/).
script_location = alembic

# Timestamp-prefixed migration filenames for stable ordering.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Add backend/ to sys.path so env.py can import app.*
prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
